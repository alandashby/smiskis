<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMISKI | Full Cloud Master Log</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-primary: #ffffff;
            --bg-sidebar: #fafafa;
            --header-yellow: #F6E957;
            --accent-green: #95ca72;
            --breadcrumb: #89b86b;
            --text-main: #333333;
            --text-muted: #7a6e1d;
            --card-bg: #ffffff;
            --border-color: #eeeeee;
            --glow-effect: none;
        }

        .theme-glow { 
            --bg-primary: #05070a;
            --bg-sidebar: #0a0c14;
            --header-yellow: #0a0c14;
            --accent-green: #95ca72;
            --breadcrumb: #1a1e36;
            --text-main: #95ca72;
            --text-muted: #95ca72;
            --card-bg: #0d111a;
            --border-color: #1a1e36;
            --glow-effect: 0 0 18px rgba(149, 202, 114, 0.9);
        }

        body { background-color: var(--bg-primary); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; transition: all 0.3s ease; scroll-behavior: smooth; }
        .sidebar { background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); width: 280px; display: flex; flex-direction: column; }
        .brand-header { background-color: var(--header-yellow); padding: 2rem 1rem; text-align: center; border-bottom: 2px solid var(--accent-green); }
        .logo-text { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.05em; color: var(--breadcrumb); line-height: 1; }
        .theme-glow .logo-text { color: var(--accent-green); text-shadow: var(--glow-effect); }
        .mastery-bar-container { background-color: var(--breadcrumb); color: white; padding: 0.75rem 1rem; font-size: 0.7rem; font-weight: 900; width: 100%; }
        
        .figure-img { transition: all 0.4s ease; filter: grayscale(100%) brightness(0.4) opacity(0.5) contrast(1.7); }
        .figure-img-found { filter: grayscale(0%) opacity(1) contrast(1) !important; transform: scale(1.05); }
        .theme-glow .figure-img-found { filter: drop-shadow(var(--glow-effect)) brightness(1.3) !important; }

        .series-pill { background-color: var(--header-yellow); color: var(--text-muted); padding: 10px 40px; border-radius: 999px; font-weight: 900; font-size: 1.8rem; display: inline-block; border: 2px solid var(--accent-green); }
        .figure-card { background-color: var(--card-bg); border: 1px solid var(--border-color); transition: all 0.3s ease; border-radius: 1.5rem; position: relative; }
        .name-label { background-color: var(--header-yellow); color: var(--text-muted); padding: 6px 12px; border-radius: 999px; font-weight: 700; font-size: 0.6rem; display: inline-block; width: 100%; text-align: center; border: 1px solid var(--accent-green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .counter-badge { position: absolute; top: 12px; left: 12px; background: var(--bg-primary); border: 1px solid var(--accent-green); border-radius: 20px; padding: 2px 8px; font-size: 10px; font-weight: 900; z-index: 10; display: flex; gap: 6px; }
        .nav-tab { transition: all 0.2s; border-bottom: 4px solid transparent; padding-bottom: 4px; opacity: 0.5; color: var(--text-muted); font-weight: 900; }
        .nav-tab-active { border-bottom: 4px solid var(--accent-green); opacity: 1; color: var(--accent-green); }
    </style>
</head>
<body :class="settings.siteTheme === 'glow' ? 'theme-glow' : ''">
    <div id="app" class="flex min-h-screen">
        <aside class="sidebar h-screen sticky top-0 shrink-0">
            <div class="brand-header">
                <div class="logo-text">スミスキ━</div>
            </div>
            <div class="mastery-bar-container flex justify-between uppercase">
                <span>Mastery: {{ totalMastery }}%</span>
                <span>{{ syncStatus }}</span>
            </div>
            <nav class="flex-grow overflow-y-auto p-4 space-y-1">
                <a v-for="series in collection" :href="'#' + series.name" class="flex justify-between p-2 text-[10px] font-bold text-gray-400 uppercase hover:bg-black/5 rounded-lg">
                    <span>{{ series.name }}</span><span>{{ getSeriesOwned(series) }}</span>
                </a>
            </nav>
            <div class="p-4 border-t border-gray-100">
                <button @click="pushData" class="w-full p-2 bg-gray-100 text-gray-400 text-[9px] font-black uppercase rounded-lg">Push to Cloud</button>
            </div>
        </aside>

        <main class="flex-grow overflow-y-auto h-screen">
            <header class="bg-[#F6E957] px-12 py-8 flex justify-end gap-10 text-[11px] font-black uppercase tracking-widest" :style="settings.siteTheme === 'official' ? 'color: #7a6e1d' : ''">
                <button @click="viewMode = 'all'" :class="['nav-tab', {'nav-tab-active': viewMode === 'all'}]">Catalog</button>
                <button @click="viewMode = 'found'" :class="['nav-tab', {'nav-tab-active': viewMode === 'found'}]">Found List</button>
                <button @click="viewMode = 'settings'" :class="['nav-tab', {'nav-tab-active': viewMode === 'settings'}]">Settings</button>
            </header>

            <div v-if="viewMode === 'settings'" class="p-20">
                <h2 class="series-pill uppercase mb-10 text-center">Site Themes</h2>
                <div class="max-w-xl mx-auto bg-gray-50/5 p-10 rounded-3xl border border-gray-200 text-center flex gap-4">
                    <button @click="setTheme('official')" :class="['p-4 rounded-xl border flex-grow font-bold uppercase text-[10px]', settings.siteTheme === 'official' ? 'bg-white text-black border-yellow-400' : 'bg-black/5']">Official Yellow</button>
                    <button @click="setTheme('glow')" :class="['p-4 rounded-xl border flex-grow font-bold uppercase text-[10px]', settings.siteTheme === 'glow' ? 'bg-[#0a0c1a] text-green-400 border-green-400' : 'bg-black/5']">Glow in the Dark</button>
                </div>
            </div>

            <div v-else-if="viewMode === 'found'" class="p-20">
                <h2 class="series-pill uppercase mb-16 italic">Collected Gallery</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8">
                    <div v-for="item in foundList" class="figure-card p-6 flex flex-col items-center">
                        <div class="counter-badge"><span>QTY: {{ item.count }}</span></div>
                        <img :src="'./' + item.fileName" class="figure-img-found w-full mb-4">
                        <div class="name-label">{{ item.name }}</div>
                    </div>
                </div>
            </div>

            <div v-else class="p-20 space-y-40">
                <section v-for="series in collection" :id="series.name" class="text-center scroll-mt-32">
                    <h2 class="series-pill uppercase mb-20">{{ series.name }}</h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-y-16 gap-x-6">
                        <div v-for="item in series.items" class="figure-card p-4 flex flex-col items-center">
                            <div class="counter-badge"><button @click.stop="updateCount(item, -1)">-</button><span>{{ item.count }}</span><button @click.stop="updateCount(item, 1)">+</button></div>
                            <img :src="'./' + item.fileName" :class="['figure-img mb-6 h-32 object-contain', {'figure-img-found': item.count > 0}]">
                            <div class="name-label uppercase truncate">{{ item.name }}</div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbzGf4Yppu5ZIyek2sXy3ON8jA8bdCUH4_zY1zWA5joDhdUCuzGyKUJfhQsd3J9q8x1nGg/exec';
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    viewMode: 'all', syncStatus: '...', settings: { siteTheme: 'official' },
                    collection: [
                        { name: 'Series 1', items: [{name:'Hugging Knees', fileName:'s1_01.png'},{name:'Sitting', fileName:'s1_02.png'},{name:'Looking Back', fileName:'s1_03.png'},{name:'Lounging', fileName:'s1_04.png'},{name:'Hiding', fileName:'s1_05.png'},{name:'Peeking', fileName:'s1_06.png'},{name:'Secret Scream', fileName:'secret.jpg'}] },
                        { name: 'Series 2', items: [{name:'Kneeling', fileName:'s2_01.png'},{name:'Peeking', fileName:'s2_02.png'},{name:'Climbing', fileName:'s2_03.png'},{name:'Resting', fileName:'s2_04.png'},{name:'Looking Up', fileName:'s2_05.png'},{name:'Pushing', fileName:'s2_06.png'},{name:'Birth of Venus', fileName:'secret.jpg'}] },
                        { name: 'Series 3', items: [{name:'Bridge', fileName:'3_3 (1).png'},{name:'Peeking', fileName:'3_4 (1).png'},{name:'Climbing', fileName:'3_5 (1).png'},{name:'Little', fileName:'3_6 (1).png'},{name:'Hiding', fileName:'3_7 (1).png'},{name:'Handstand', fileName:'3_8 (1).png'},{name:'Thinker', fileName:'secret.jpg'}] },
                        { name: 'Series 4', items: [{name:'Crawl', fileName:'01.png'},{name:'Hold Up', fileName:'02.png'},{name:'Squatting', fileName:'03.png'},{name:'Flute', fileName:'04.png'},{name:'With Cat', fileName:'05.png'},{name:'Peeking', fileName:'06.png'},{name:'Twin Angels', fileName:'secret.jpg'}] },
                        { name: 'Work', items: [{name:'Approving', fileName:'img_work_products_01.png'},{name:'Researching', fileName:'img_work_products_02.png'},{name:'Presenting', fileName:'img_work_products_04.png'},{name:'Good Idea', fileName:'img_work_products_05.png'},{name:'On the Road', fileName:'img_work_products_06.png'},{name:'Group Think', fileName:'img_work_products_03.png'},{name:'Secret Cat', fileName:'secret.jpg'}] },
                        { name: 'Sunday', items: [{name:'Blowing Bubbles', fileName:'img_product_sunday01.png'},{name:'Paper Airplane', fileName:'img_product_sunday02.png'},{name:'Sunbathing', fileName:'img_product_sunday03.png'},{name:'Sing-Along', fileName:'img_product_sunday04.png'},{name:'Skateboarding', fileName:'img_product_sunday05.png'},{name:'Gardening', fileName:'img_product_sunday06.png'},{name:'Secret Dog Walker', fileName:'secret.jpg'}] },
                        { name: 'Exercising', items: [{name:'Doing Crunches', fileName:'img_doingcrunches.png'},{name:'Aerobics', fileName:'img_aerobics.png'},{name:'Balance', fileName:'img_balance.png'},{name:'Dumbbell', fileName:'img_dumbbell.png'},{name:'Hoop', fileName:'img_hulahoop.png'},{name:'Stretch', fileName:'img_stretch.png'},{name:'Buff Secret', fileName:'secret.jpg'}] },
                        { name: 'Dressing', items: [{name:'Underpants', fileName:'img_underpants_2.png'},{name:'Struggling', fileName:'img_struggling.png'},{name:'Loose Pants', fileName:'img_loose-pants.png'},{name:'Putting On Socks', fileName:'img_putting-on-socks_2.png'},{name:'Sweater', fileName:'img_sweater.png'},{name:'Tight Pants', fileName:'img_tight-pants.png'},{name:'Secret Bunny', fileName:'secret.jpg'}] },
                        { name: 'Museum', items: [{name:'The Source', fileName:'img_museum_products_01.png'},{name:'Fujin & Raijin', fileName:'img_museum_products_02.png'},{name:'Bacchus', fileName:'img_museum_products_03.png'},{name:'Velázquez', fileName:'img_museum_products_04.png'},{name:'Dali', fileName:'img_museum_products_05.png'},{name:'Pearl Earring', fileName:'img_museum_products_06.png'},{name:'King Tut', fileName:'secret.jpg'}] },
                        { name: 'Moving', items: [{name:'Carrying Ladder', fileName:'carrying-ladder.png'},{name:'Balancing Boxes', fileName:'balancing-boxes.png'},{name:'Decorating', fileName:'decorating.png'},{name:'Teamwork', fileName:'teamwork.png'},{name:'Green Thumb', fileName:'green-thumb.png'},{name:'Falling Down', fileName:'falling-down.png'},{name:'Secret Bear', fileName:'secret.jpg'}] },
                        { name: 'Yoga', items: [{name:'Lotus', fileName:'img_yoga_01.png'},{name:'Tree', fileName:'img_yoga_02.png'},{name:'Shoulder Stand', fileName:'img_yoga_03.png'},{name:'Cobra', fileName:'img_yoga_04.png'},{name:'Bridge', fileName:'img_yoga_05.png'},{name:'Triangle', fileName:'img_yoga_06.png'},{name:'Secret Hearts', fileName:'secret.jpg'}] }
                    ].map(s => ({...s, items: s.items.map(i => ({...i, count: 0}))}))
                }
            },
            computed: {
                foundList() { return this.collection.flatMap(s => s.items).filter(i => i.count > 0); },
                totalOwned() { return this.foundList.length; },
                totalPossible() { return this.collection.flatMap(s => s.items).length; },
                totalMastery() { return Math.round((this.totalOwned / this.totalPossible) * 100); }
            },
            methods: {
                setTheme(t) { this.settings.siteTheme = t; this.pushData(); },
                async pullData() {
                    try {
                        const res = await fetch(CLOUD_URL);
                        const data = await res.json();
                        data.forEach(row => {
                            if (row.series === 'SYSTEM' && row.name === 'Theme') { this.settings.siteTheme = row.count; return; }
                            const series = this.collection.find(s => s.name === row.series);
                            if (series) {
                                const item = series.items.find(i => i.name === row.name);
                                if (item) item.count = parseInt(row.count);
                            }
                        });
                        this.syncStatus = 'Live';
                    } catch (e) { this.syncStatus = 'Off'; }
                },
                async pushData() {
                    this.syncStatus = '...';
                    const payload = this.collection.flatMap(s => s.items.map(i => ({series: s.name, name: i.name, count: i.count})));
                    payload.push({series: 'SYSTEM', name: 'Theme', count: this.settings.siteTheme});
                    await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
                    this.syncStatus = 'Live';
                },
                updateCount(item, v) { item.count = Math.max(0, item.count + v); this.pushData(); },
                getSeriesOwned(s) { return s.items.filter(i => i.count > 0).length; }
            },
            mounted() { this.pullData(); }
        }).mount('#app')
    </script>
</body>
</html>
