<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMISKI | Master Archive</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-primary: #ffffff;
            --bg-sidebar: #fafafa;
            --header-yellow: #F6E957;
            --accent-green: #95ca72;
            --breadcrumb: #89b86b;
            --text-main: #333333;
            --text-muted: #7a6e1d;
            --card-bg: #ffffff;
            --border-color: #eeeeee;
        }

        .theme-glow { 
            --bg-primary: #05070a;
            --bg-sidebar: #0a0c14;
            --header-yellow: #0a0c14;
            --accent-green: #95ca72;
            --breadcrumb: #1a1e36;
            --text-main: #95ca72;
            --text-muted: #95ca72;
            --card-bg: #0d111a;
            --border-color: #1a1e36;
            --glow-effect: 0 0 18px rgba(149, 202, 114, 0.9);
        }

        body { background-color: var(--bg-primary); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; transition: all 0.3s ease; overflow-x: hidden; }

        /* Sidebar & Mobile Layout Logic */
        .sidebar { background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); width: 280px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--header-yellow); border-top: 2px solid var(--accent-green); z-index: 1000; height: 70px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; justify-content: space-around; align-items: center; }
            .main-content { padding-bottom: 90px !important; }
            .catalog-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 1rem !important; }
            .series-pill { font-size: 1.2rem !important; padding: 8px 24px !important; }
            header { display: none !important; }
        }

        /* Found Figure Glow/Silhouette logic */
        .figure-img { transition: all 0.4s ease; filter: grayscale(100%) brightness(0.4) opacity(0.6) contrast(1.7); }
        .figure-img-found { filter: grayscale(0%) opacity(1) contrast(1) !important; transform: scale(1.05); }
        .theme-glow .figure-img-found { filter: drop-shadow(var(--glow-effect)) brightness(1.3) !important; }

        .series-pill { background-color: var(--header-yellow); color: var(--text-muted); padding: 12px 48px; border-radius: 999px; font-weight: 900; font-size: 2rem; display: inline-block; border: 2px solid var(--accent-green); }
        .figure-card { background-color: var(--card-bg); border: 1px solid var(--border-color); transition: all 0.3s ease; border-radius: 1.25rem; position: relative; }
        .name-label { background-color: var(--header-yellow); color: var(--text-muted); padding: 6px 12px; border-radius: 999px; font-weight: 700; font-size: 0.6rem; display: inline-block; width: 100%; text-align: center; border: 1px solid var(--accent-green); overflow: hidden; }
        .counter-badge { position: absolute; top: 8px; left: 8px; background: var(--bg-primary); border: 1px solid var(--accent-green); border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 900; z-index: 10; display: flex; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body :class="settings.siteTheme === 'glow' ? 'theme-glow' : ''">
    <div id="app" class="flex min-h-screen">
        <aside class="sidebar">
            <div class="p-8 bg-[#F6E957] text-center border-b-2 border-[#89b86b]">
                <div class="text-2xl font-black text-[#89b86b]">スミスキ━</div>
                <div class="text-[10px] font-black uppercase tracking-widest mt-1">Status: {{ syncStatus }}</div>
            </div>
            <nav class="flex-grow overflow-y-auto p-4 space-y-1">
                <a v-for="series in collection" :href="'#' + series.name" class="flex justify-between p-3 text-[10px] font-bold text-gray-400 uppercase hover:bg-black/5 rounded-lg transition-all">
                    <span>{{ series.name }}</span><span>{{ getSeriesOwned(series) }}</span>
                </a>
            </nav>
        </aside>

        <nav class="mobile-nav px-4">
            <button @click="viewMode = 'all'" class="flex flex-col items-center">
                <span class="text-[10px] font-black uppercase" :style="viewMode === 'all' ? 'color:black' : 'opacity:0.5'">Catalog</span>
            </button>
            <button @click="viewMode = 'found'" class="flex flex-col items-center">
                <span class="text-[10px] font-black uppercase" :style="viewMode === 'found' ? 'color:black' : 'opacity:0.5'">My Found</span>
            </button>
            <button @click="toggleTheme" class="flex flex-col items-center">
                <span class="text-[10px] font-black uppercase">Theme</span>
            </button>
        </nav>

        <main class="flex-grow main-content overflow-y-auto">
            <header class="bg-[#F6E957] px-12 py-8 flex justify-end gap-10 text-[11px] font-black uppercase tracking-widest text-[#7a6e1d]">
                <button @click="viewMode = 'all'">Catalog</button>
                <button @click="viewMode = 'found'">Found</button>
                <button @click="toggleTheme">Glow Toggle</button>
            </header>

            <div class="p-6 md:p-20 space-y-20 md:space-y-40">
                <div v-if="viewMode === 'found'">
                    <h2 class="series-pill uppercase mb-10">Collection Gallery</h2>
                    <div class="grid catalog-grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                        <div v-for="item in foundList" class="figure-card p-4 flex flex-col items-center">
                            <div class="counter-badge"><span>QTY: {{ item.count }}</span></div>
                            <img :src="'./' + item.fileName" class="figure-img-found w-full mb-4">
                            <div class="name-label">{{ item.name }}</div>
                        </div>
                    </div>
                </div>

                <div v-else v-for="series in collection" :id="series.name" class="text-center scroll-mt-32">
                    <h2 class="series-pill uppercase mb-10 md:mb-20">{{ series.name }}</h2>
                    <div class="grid catalog-grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-6 md:gap-8">
                        <div v-for="item in series.items" class="figure-card p-4 flex flex-col items-center">
                            <div class="counter-badge">
                                <button @click.stop="updateCount(item, -1)">-</button>
                                <span>{{ item.count }}</span>
                                <button @click.stop="updateCount(item, 1)">+</button>
                            </div>
                            <img :src="'./' + item.fileName" :class="['figure-img mb-4 h-24 md:h-32 object-contain', {'figure-img-found': item.count > 0}]">
                            <div class="name-label uppercase truncate">{{ item.name }}</div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbzGf4Yppu5ZIyek2sXy3ON8jA8bdCUH4_zY1zWA5joDhdUCuzGyKUJfhQsd3J9q8x1nGg/exec';
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    viewMode: 'all', syncStatus: '...', settings: { siteTheme: 'official' },
                    collection: [
                        { name: 'Series 1', items: [{name:'Hugging Knees', fileName:'s1_01.png'},{name:'Sitting', fileName:'s1_02.png'},{name:'Looking Back', fileName:'s1_03.png'},{name:'Lounging', fileName:'s1_04.png'},{name:'Hiding', fileName:'s1_05.png'},{name:'Peeking', fileName:'s1_06.png'},{name:'The Scream', fileName:'secret.jpg'}] },
                        { name: 'Series 2', items: [{name:'Kneeling', fileName:'s2_01.png'},{name:'Peeking', fileName:'s2_02.png'},{name:'Climbing', fileName:'s2_03.png'},{name:'Resting', fileName:'s2_04.png'},{name:'Looking Up', fileName:'s2_05.png'},{name:'Pushing', fileName:'s2_06.png'},{name:'Birth of Venus', fileName:'secret.jpg'}] },
                        { name: 'Series 3', items: [{name:'Bridge', fileName:'3_3 (1).png'},{name:'Peeking', fileName:'3_4 (1).png'},{name:'Climbing', fileName:'3_5 (1).png'},{name:'Little', fileName:'3_6 (1).png'},{name:'Hiding', fileName:'3_7 (1).png'},{name:'Handstand', fileName:'3_8 (1).png'},{name:'Thinker', fileName:'secret.jpg'}] },
                        { name: 'Series 4', items: [{name:'Crawl', fileName:'01.png'},{name:'Hold Up', fileName:'02.png'},{name:'Squatting', fileName:'03.png'},{name:'Flute', fileName:'04.png'},{name:'With Cat', fileName:'05.png'},{name:'Peeking', fileName:'06.png'},{name:'Twin Angels', fileName:'secret.jpg'}] },
                        { name: 'Work', items: [{name:'Approving', fileName:'img_work_products_01.png'},{name:'Researching', fileName:'img_work_products_02.png'},{name:'Presenting', fileName:'img_work_products_04.png'},{name:'Good Idea', fileName:'img_work_products_05.png'},{name:'On the Road', fileName:'img_work_products_06.png'},{name:'Group Think', fileName:'img_work_products_03.png'},{name:'Secret Cat', fileName:'secret.jpg'}] },
                        { name: 'Sunday', items: [{name:'Blowing Bubbles', fileName:'img_product_sunday01.png'},{name:'Paper Airplane', fileName:'img_product_sunday02.png'},{name:'Sunbathing', fileName:'img_product_sunday03.png'},{name:'Sing-Along', fileName:'img_product_sunday04.png'},{name:'Skateboarding', fileName:'img_product_sunday05.png'},{name:'Gardening', fileName:'img_product_sunday06.png'},{name:'Secret Dog Walker', fileName:'secret.jpg'}] },
                        { name: 'Exercising', items: [{name:'Doing Crunches', fileName:'img_doingcrunches.png'},{name:'Aerobics', fileName:'img_aerobics.png'},{name:'Balance', fileName:'img_balance.png'},{name:'Dumbbell', fileName:'img_dumbbell.png'},{name:'Hoop', fileName:'img_hulahoop.png'},{name:'Stretch', fileName:'img_stretch.png'},{name:'Buff Secret', fileName:'secret.jpg'}] },
                        { name: 'Dressing', items: [{name:'Underpants', fileName:'img_underpants_2.png'},{name:'Struggling', fileName:'img_struggling.png'},{name:'Loose Pants', fileName:'img_loose-pants.png'},{name:'Putting On Socks', fileName:'img_putting-on-socks_2.png'},{name:'Sweater', fileName:'img_sweater.png'},{name:'Tight Pants', fileName:'img_tight-pants.png'},{name:'Secret Bunny', fileName:'secret.jpg'}] },
                        { name: 'Museum', items: [{name:'The Source', fileName:'img_museum_products_01.png'},{name:'Fujin & Raijin', fileName:'img_museum_products_02.png'},{name:'Bacchus', fileName:'img_museum_products_03.png'},{name:'Velázquez', fileName:'img_museum_products_04.png'},{name:'Dali', fileName:'img_museum_products_05.png'},{name:'Pearl Earring', fileName:'img_museum_products_06.png'},{name:'King Tut', fileName:'secret.jpg'}] },
                        { name: 'Moving', items: [{name:'Carrying Ladder', fileName:'carrying-ladder.png'},{name:'Balancing Boxes', fileName:'balancing-boxes.png'},{name:'Decorating', fileName:'decorating.png'},{name:'Teamwork', fileName:'teamwork.png'},{name:'Green Thumb', fileName:'green-thumb.png'},{name:'Falling Down', fileName:'falling-down.png'},{name:'Secret Bear', fileName:'secret.jpg'}] },
                        { name: 'Yoga', items: [{name:'Lotus', fileName:'img_yoga_01.png'},{name:'Tree', fileName:'img_yoga_02.png'},{name:'Shoulder Stand', fileName:'img_yoga_03.png'},{name:'Cobra', fileName:'img_yoga_04.png'},{name:'Bridge', fileName:'img_yoga_05.png'},{name:'Triangle', fileName:'img_yoga_06.png'},{name:'Secret Hearts', fileName:'secret.jpg'}] },
                        { name: 'Hippers', items: [{name:'Up', fileName:'hippers_01.png'},{name:'Leaning', fileName:'hippers_02.png'},{name:'Peeking', fileName:'hippers_03.png'},{name:'Hanging', fileName:'hippers_04.png'},{name:'Climbing', fileName:'hippers_05.png'},{name:'Crawl', fileName:'hippers_06.png'},{name:'Secret Headphones', fileName:'secret.jpg'}] }
                    ].map(s => ({...s, items: s.items.map(i => ({...i, count: 0}))}))
                }
            },
            computed: {
                foundList() { return this.collection.flatMap(s => s.items).filter(i => i.count > 0); },
                totalOwned() { return this.foundList.length; },
                totalPossible() { return this.collection.flatMap(s => s.items).length; },
                totalMastery() { return Math.round((this.totalOwned / this.totalPossible) * 100); }
            },
            methods: {
                toggleTheme() { this.settings.siteTheme = this.settings.siteTheme === 'glow' ? 'official' : 'glow'; this.pushData(); },
                async pullData() {
                    try {
                        const res = await fetch(CLOUD_URL);
                        const data = await res.json();
                        data.forEach(row => {
                            if (row.series === 'SYSTEM' && row.name === 'Theme') { this.settings.siteTheme = row.count; return; }
                            const series = this.collection.find(s => s.name === row.series);
                            if (series) {
                                const item = series.items.find(i => i.name === row.name);
                                if (item) item.count = parseInt(row.count);
                            }
                        });
                        this.syncStatus = 'Live';
                    } catch (e) { this.syncStatus = 'Off'; }
                },
                async pushData() {
                    this.syncStatus = '...';
                    const payload = this.collection.flatMap(s => s.items.map(i => ({series: s.name, name: i.name, count: i.count})));
                    payload.push({series: 'SYSTEM', name: 'Theme', count: this.settings.siteTheme});
                    await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
                    this.syncStatus = 'Live';
                },
                updateCount(item, v) { item.count = Math.max(0, item.count + v); this.pushData(); },
                getSeriesOwned(s) { return s.items.filter(i => i.count > 0).length; }
            },
            mounted() { this.pullData(); }
        }).mount('#app')
    </script>
</body>
</html>
